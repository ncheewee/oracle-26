name: Hourly FIFA refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

concurrency:
  group: oracle-26-hourly-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium

      - name: Scrape latest FIFA fixtures and standings
        run: pnpm run collect

      - name: Rebuild predictions when FIFA facts changed
        id: fifa
        run: |
          if git diff --quiet -- outputs/worldcup.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No FIFA fixture/standing changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            pnpm run audit
            pnpm run model
            SIMULATIONS=100000 pnpm run simulate
            pnpm run history
          fi

      - name: Refresh Singapore Pools odds
        run: pnpm run odds

      - name: Validate generated outputs
        run: pnpm test

      - name: Commit refreshed outputs
        run: |
          git config user.name "oracle-26-bot"
          git config user.email "oracle-26-bot@users.noreply.github.com"
          git add outputs/data-availability.json outputs/data-availability.md outputs/worldcup.json outputs/model.json outputs/tournament-simulation.json outputs/prediction-history.json outputs/market-odds.json
          git diff --cached --quiet || git commit -m "data: hourly FIFA refresh"
          git push
